services:
  gateway:
    build:
      context: ./eHistorian.Gateway
      dockerfile: Dockerfile
    image: ehistorian-gateway:latest
    container_name: ehistorian-gateway
    restart: unless-stopped
    environment:
      - EHG_BOOTSTRAP_CONFIG=/app/bootstrap.config.json
      - EHG_SQLITE_PATH=/data/offline-buffer.db
    volumes:
      - ./eHistorian.Gateway/bootstrap.config.json:/app/bootstrap.config.json
      - ./eHistorian.Gateway/data:/data
      - ./eHistorian.Gateway/cache:/app/cache
    ports:
      - "8088:8088"
